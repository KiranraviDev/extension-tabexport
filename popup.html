<!DOCTYPE html>
<html lang="en">
<head>
    <script src="tailwind.js"></script>
</head>
<body class="bg-slate-950 w-72 p-5 text-slate-100 font-sans overflow-hidden">
    
    <div class="bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl p-5 shadow-2xl">
        <div class="flex justify-center mb-4">
            <img src="logo.png" alt="TabExport Pro logo" class="w-12 h-12 rounded-xl object-cover shadow-lg ring-1 ring-white/10">
        </div>
        <h2 class="text-xs font-bold uppercase tracking-widest text-indigo-400 mb-4 text-center">TabExport Pro</h2>
        
        <input type="text" id="export-purpose" 
               class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mb-4 text-sm focus:ring-2 focus:ring-indigo-500 outline-none placeholder:text-slate-500" 
               placeholder="Project Name...">

        <div class="grid gap-2">
            <button id="btn-md" class="bg-indigo-600/80 hover:bg-indigo-500 transition-all py-2 rounded-xl font-semibold text-sm shadow-lg">Export Markdown</button>
            <button id="btn-csv" class="bg-indigo-600/80 hover:bg-indigo-500 transition-all py-2 rounded-xl font-semibold text-sm shadow-lg">Export CSV</button>
            <button id="btn-txt" class="bg-indigo-600/80 hover:bg-indigo-500 transition-all py-2 rounded-xl font-semibold text-sm shadow-lg">Export Text</button>
        </div>

        <div class="mt-6 pt-4 border-t border-white/5 text-center">
            <p class="text-[10px] text-slate-500 uppercase tracking-wider">Designed by kiranravi</p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
